<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Football Career Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --gold: #C9A84C; --gold-light: #E8C97A; --gold-dim: #2a2008;
        --dark: #0D0D0F; --dark2: #141418; --dark3: #1C1C22; --dark4: #26262F;
        --border: rgba(201,168,76,0.15); --border2: rgba(201,168,76,0.38);
        --text: #F0EDE6; --text2: #9A9590; --text3: #5A5650;
        --green: #2ECC71; --red: #E74C3C; --blue: #3498DB; --purple: #9B59B6;
        --radius: 12px;
        --font-display: 'Bebas Neue', sans-serif;
        --font-body: 'DM Sans', sans-serif;
      }
      html, body, #root { height: 100%; background: var(--dark); color: var(--text); font-family: var(--font-body); }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--dark2); }
      ::-webkit-scrollbar-thumb { background: var(--dark4); border-radius: 3px; }
    </style>
  </head>
  <body><div id="root"></div></body>
</html>
